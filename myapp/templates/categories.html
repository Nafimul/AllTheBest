{% extends 'base.html' %}
{% block title %}Categories{% endblock %}
{% block content %}
    <h1>Categories</h1>
    {% if categories %}
        <ul>
        {% for category in categories %}
            <li>{{ category.name }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No categories found.</p>
    {% endif %}
{% endblock %}
