{% extends 'base.html' %}
{% block title %}Add Things{% endblock %}
{% block file_links %}
    <script type='module' src='{{ url_for("static", filename="scripts/add-things.js") }}'></script>
{% endblock %}
{% block content %}
    <section class="page-header">
        <h2>Add Things</h2>
        <p>Use the thing cards below to add one or more things. Each card has its own submit action and status message.</p>
    </section>

    <div class="form-actions">
        <label for="bulkImageUpload">Upload multiple images to create forms</label>
        <input id="bulkImageUpload" type="file" multiple accept="image/*">
        <button id="duplicateFormButton" type="button">Duplicate form</button>
    </div>

    <div id="formsContainer"></div>

    <template id="thingFormTemplate">
        <form class="thing-form" enctype="multipart/form-data">
            <div class="form-card">
                <h3>Thing</h3>

                <label>Name</label>
                <input name="thingName" type="text" placeholder="Darth Vader">

                <label>From</label>
                <input name="fromThingName" type="text" placeholder="Star Wars">

                <label>Image</label>
                <input name="thingImage" type="file" accept="image/*">
                <img class="imagePreview" alt="Image preview will appear here">

                <p class="formMessage"></p>
                <button type="submit">Add Thing</button>
            </div>
        </form>
    </template>
{% endblock %}
